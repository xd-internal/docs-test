name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for showLastUpdateTime

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # No cache here — we generate the lock file in the next step

      - name: Install dependencies and generate lock file
        # npm install creates package-lock.json if missing, then installs.
        # This avoids the "lock file not found" error when the repo has
        # only package.json committed (common for new Docusaurus projects).
        run: npm install

      - name: Build website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
